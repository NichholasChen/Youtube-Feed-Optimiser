<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Optimiser</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; gap: 10px; padding: 20px; }
        button { padding: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="calibrateFeed('1')">MUSIC</button>
    <button onclick="calibrateFeed('2')">MAKEUP</button>
    <button onclick="calibrateFeed('3')">GAMING</button>
    <button onclick="calibrateFeed('4')">VLOGS</button>
    <button onclick="calibrateFeed('5')">LANGUAGES</button>

    <script>
        function calibrateFeed(profileId) {
            pywebview.api.calibrate(profileId).then(function(response) {
                alert(response);
            });
        }
    </script>
</body>
</html>
